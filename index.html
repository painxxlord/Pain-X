<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PainXHub | Home</title>
    <style>
        :root { --red: #cc0000; --dark-bg: #05070a; --card-bg: rgba(17, 24, 39, 0.95); }
        body { background-color: var(--dark-bg); color: #f3f4f6; font-family: sans-serif; margin: 0; padding: 0; }
        .hidden { display: none !important; }
        .flex-center { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: var(--card-bg); border: 2px solid var(--red); padding: 30px; border-radius: 16px; text-align: center; width: 90%; max-width: 400px; }
        .input-box { width: 100%; background: #0b111e; border: 1px solid var(--red); color: white; padding: 14px; border-radius: 8px; margin-bottom: 12px; box-sizing: border-box; }
        .btn { background: var(--red); color: white; padding: 14px; border: none; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        header { background: #0b111e; border-bottom: 2px solid var(--red); padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .feed-layout { max-width: 600px; margin: 20px auto; padding: 0 15px; }
        .post-input { width: 100%; background: #0b111e; border: 1px solid #374151; color: white; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        .timeline-post { background: var(--card-bg); border: 1px solid #1f2937; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="gatewaySection" class="flex-center">
        <div class="card">
            <h2 id="authTitle">Join the Akatsuki</h2>
            <form id="authForm">
                <div id="registerFields">
                    <input type="text" id="authFirstName" placeholder="First Name" class="input-box">
                    <input type="text" id="authLastName" placeholder="Last Name" class="input-box">
                </div>
                <input type="email" id="authEmail" placeholder="Email" class="input-box" required>
                <input type="password" id="authPassword" placeholder="Password" class="input-box" required>
                <button type="submit" id="submitBtn" class="btn">Enter Hub Space</button>
            </form>
            <p style="cursor:pointer; color:var(--red); font-size:13px;" id="switchBtn">Already a member? Log In</p>
        </div>
    </div>

    <div id="dashboardSection" class="hidden">
        <header>
            <div style="font-weight:bold;">Pain<span>X</span>Hub</div>
            <button class="btn" id="logoutBtn" style="width:auto; padding:5px 15px;">Logout</button>
        </header>
        <div class="feed-layout">
            <textarea id="postText" class="post-input" placeholder="What's on your mind?"></textarea>
            <button id="submitPostBtn" class="btn">Publish Post</button>
            <div id="timelineStream" style="margin-top:20px;"></div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAN4oKAF6Od2u6aMOBk8G9u4Xa2QyRFWio",
        authDomain: "painakatsukihub-33fa6.firebaseapp.com",
        projectId: "painakatsukihub-33fa6",
        storageBucket: "painakatsukihub-33fa6.firebasestorage.app",
        messagingSenderId: "327168157848",
        appId: "1:327168157848:web:49f6f22ed027cbb48608ed"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let isLogin = false;
    document.getElementById('switchBtn').onclick = () => {
        isLogin = !isLogin;
        document.getElementById('registerFields').classList.toggle('hidden', isLogin);
        document.getElementById('authTitle').textContent = isLogin ? "Log In" : "Join the Akatsuki";
        document.getElementById('submitBtn').textContent = isLogin ? "Log In" : "Enter Hub Space";
    };

    document.getElementById('authForm').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('authEmail').value;
        const pass = document.getElementById('authPassword').value;
        try {
            if(isLogin) await signInWithEmailAndPassword(auth, email, pass);
            else {
                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                await set(ref(db, 'users/' + cred.user.uid), { name: document.getElementById('authFirstName').value + " " + document.getElementById('authLastName').value });
            }
        } catch(err) { alert(err.message); }
    };

    document.getElementById('submitPostBtn').onclick = async () => {
        const text = document.getElementById('postText').value;
        if(text) {
            await push(ref(db, 'posts'), { text, author: auth.currentUser.uid, time: Date.now() });
            document.getElementById('postText').value = "";
        }
    };

    onAuthStateChanged(auth, user => {
        if(user) {
            document.getElementById('gatewaySection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            onValue(ref(db, 'posts'), snap => {
                const stream = document.getElementById('timelineStream'); stream.innerHTML = "";
                snap.forEach(c => { stream.innerHTML += `<div class="timeline-post">${c.val().text}</div>`; });
            });
        }
    });

    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());
</script>
</body>
</html>
