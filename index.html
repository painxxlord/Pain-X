<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PainXHub</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: #1c1c1c; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 8px 0; box-sizing: border-box; border-radius: 5px; border: 1px solid #444; background: #000; color: white; }
        .btn { background: #cc0000; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <div id="authSection" class="card">
            <h2 id="formTitle">Join PainXHub</h2>
            <input type="text" id="fname" placeholder="First Name">
            <input type="text" id="lname" placeholder="Last Name">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button id="authBtn" class="btn">Create Account</button>
            <p id="toggleText" style="text-align:center; margin-top:15px; cursor:pointer; color:#888;">Already have an account? <span style="color:#cc0000;">Sign In</span></p>
        </div>
        <div id="dashSection" class="hidden">
            <div class="card">
                <h3>PainXHub Profile</h3>
                <p>Followers: <span id="followerCount">1001</span></p>
                <button id="followBtn" class="btn">Unfollow Pain</button>
            </div>
        </div>
    </div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
    const app = initializeApp({ /* YOUR CONFIG */ });
    const auth = getAuth(app);
    const db = getDatabase(app);
    let isLogin = false;
    const formTitle = document.getElementById('formTitle');
    const authBtn = document.getElementById('authBtn');
    const fname = document.getElementById('fname');
    const lname = document.getElementById('lname');
    document.getElementById('toggleText').onclick = () => {
        isLogin = !isLogin;
        formTitle.innerText = isLogin ? "Sign In" : "Join PainXHub";
        authBtn.innerText = isLogin ? "Sign In" : "Create Account";
        fname.style.display = isLogin ? "none" : "block";
        lname.style.display = isLogin ? "none" : "block";
    };
    authBtn.onclick = () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        if(isLogin) signInWithEmailAndPassword(auth, e, p).then(() => { document.getElementById('authSection').classList.add('hidden'); document.getElementById('dashSection').classList.remove('hidden'); }).catch(err => alert(err.message));
        else createUserWithEmailAndPassword(auth, e, p).then(res => { set(ref(db, 'users/' + res.user.uid), { name: fname.value + " " + lname.value, followers: 1 }); document.getElementById('authSection').classList.add('hidden'); document.getElementById('dashSection').classList.remove('hidden'); }).catch(err => alert(err.message));
    };
    document.getElementById('followBtn').onclick = () => alert("You cannot unfollow Pain. He rules this place.");
</script>
</body>
</html>
