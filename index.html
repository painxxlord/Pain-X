    <script>
        let isSignUpMode = true;
        let currentUserData = null;
        let activeUid = null;
        let viewedProfileUid = null;
        let activeChatRecipientUid = null;

        function toggleAuthMode() {
            isSignUpMode = !isSignUpMode;
            document.getElementById('auth-subtitle').innerText = isSignUpMode ? "Sign up to explore the network stream" : "Sign in to access your matrix operations desk";
            document.getElementById('auth-name-wrapper').classList.toggle('hidden', !isSignUpMode);
            document.getElementById('auth-btn').innerText = isSignUpMode ? "Create Account" : "Access Console System";
            document.getElementById('auth-toggle').innerHTML = isSignUpMode ? 'Already registered? <span class="text-red-500 font-bold">Log In</span>' : 'Need a new card key? <span class="text-red-500 font-bold">Sign Up</span>';
        }

        function handleAuth(e) {
            e.preventDefault();
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            const name = document.getElementById('auth-name').value.trim();

            if (isSignUpMode) {
                auth.createUserWithEmailAndPassword(email, password).then(credential => {
                    return db.ref('users/' + credential.user.uid).set({
                        username: name, email: email, uid: credential.user.uid,
                        verified: false, followers: 0, following: 0, likes: 0, bio: "System member of Pain X.", avatarUrl: ""
                    });
                }).catch(err => alert(err.message));
            } else {
                auth.signInWithEmailAndPassword(email, password).catch(err => alert(err.message));
            }
        }

        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                activeUid = user.uid;
                db.ref('users/' + user.uid).on('value', snap => {
                    currentUserData = snap.val();
                    if(currentUserData) {
                        document.getElementById('auth-overlay').classList.add('hidden');
                        document.getElementById('app-content').classList.remove('hidden');
                        loadGlobalStreamFeed();
                        loadWhatsAppInbox();
                    }
                });
            } else {
                document.getElementById('auth-overlay').classList.remove('hidden');
                document.getElementById('app-content').classList.add('hidden');
            }
        });

        function logoutUser() {
            auth.signOut().then(() => { location.reload(); });
        }

        function switchTab(tabId) {
            document.getElementById('view-feed').classList.toggle('hidden', tabId !== 'feed');
            document.getElementById('view-videos').classList.toggle('hidden', tabId !== 'videos');
            document.getElementById('view-chat').classList.toggle('hidden', tabId !== 'chat');
            if(tabId === 'chat') document.getElementById('chat-alert').classList.add('hidden');
            document.getElementById('settings-menu').classList.add('hidden');
        }

        function toggleSettingsMenu() { document.getElementById('settings-menu').classList.toggle('hidden'); }
        function updateVideoLabel(input) { document.getElementById('video-file-name').innerText = input.files[0] ? input.files[0].name : ''; }

        // AUTOMATIC CONTENT LINK PARSING FUNCTION (0MB Storage System)
        function formatPostContent(text) {
            const imageRegex = /(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp|bmp))/i;
            if (imageRegex.test(text.trim())) {
                return `<img src="${text.trim()}" class="w-full h-auto rounded-xl my-2 max-h-96 object-cover border border-zinc-800 shadow-inner" alt="Shared Media Image" />`;
            }
            return `<p class="text-sm text-zinc-300 leading-relaxed">${text}</p>`;
        }

        function loadGlobalStreamFeed() {
            const feedContainer = document.getElementById('global-feed-stream');
            const videoContainer = document.getElementById('video-feed-stream');
            
            db.ref('posts').orderByChild('timestamp').on('value', (snapshot) => {
                feedContainer.innerHTML = '';
                videoContainer.innerHTML = '';
                
                if(!snapshot.exists()) return;
                
                let postsArray = [];
                snapshot.forEach(child => {
                    postsArray.push(child.val());
                });
                postsArray.reverse();
                
                postsArray.forEach(post => {
                    db.ref(`users/${post.uid}`).once('value', userSnap => {
                        const userProfile = userSnap.val() || {};
                        const badgeHtml = userProfile.verified ? `<img src="${RED_CHECKMARK_URL}" class="w-3.5 h-3.5 inline-block ml-1 shadow-sm" alt="Verified Badge" />` : '';
                        
                        const card = document.createElement('div');
                        card.className = "p-4 bg-zinc-900 border border-zinc-800 rounded-2xl shadow-sm space-y-3";
                        
                        let mediaBlock = formatPostContent(post.content);
                        if (post.videoUrl) {
                            mediaBlock += `
                                <div class="mt-2 rounded-xl overflow-hidden bg-black border border-zinc-800">
                                    <video src="${post.videoUrl}" controls class="w-full max-h-96 object-contain"></video>
                                </div>`;
                        }

                        card.innerHTML = `
                            <div class="flex items-center justify-between">
                                <div class="flex items-center space-x-3 cursor-pointer" onclick="openProfileView('${post.uid}')">
                                    <img src="${userProfile.avatarUrl || 'https://via.placeholder.com/150'}" class="w-9 h-9 rounded-full object-cover border border-zinc-700" />
                                    <div>
                                        <h4 class="font-bold text-white text-xs flex items-center tracking-wide">${post.username} ${badgeHtml}</h4>
                                        <span class="text-[10px] text-zinc-500 font-medium">${new Date(post.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                                    </div>
                                </div>
                                <button id="feed-follow-btn-${post.uid}" onclick="toggleFollowUser('${post.uid}')" class="px-3 py-1 bg-red-600 text-white font-bold rounded-full text-[10px] tracking-wider shadow-sm uppercase">Follow</button>
                            </div>
                            <div class="post-body-area text-zinc-300">${mediaBlock}</div>
                            <div class="flex items-center gap-4 text-xs pt-1 border-t border-zinc-800/40 text-zinc-500">
                                <button onclick="likePost('${post.id}', ${post.likes}, '${post.uid}')" class="hover:text-red-500 transition font-bold flex items-center gap-1">❤️ <span>${post.likes || 0}</span></button>
                            </div>
                        `;
                        
                        feedContainer.appendChild(card);
                        updateFollowButtonUI(post.uid, `feed-follow-btn-${post.uid}`);
                        
                        if (post.videoUrl) {
                            const videoCard = card.cloneNode(true);
                            videoContainer.appendChild(videoCard);
                        }
                    });
                });
            });
        }

        function handlePostSubmit(e) {
            e.preventDefault();
            if (!currentUserData) return;
            const text = document.getElementById('post-input').value.trim();
            const videoFile = document.getElementById('post-video-file').files[0];
            if (!text && !videoFile) return;

            const newPostRef = db.ref('posts').push();
            const postKey = newPostRef.key;

            if (videoFile) {
                const storageRef = storage.ref('videos/' + postKey + '_' + videoFile.name);
                const uploadTask = storageRef.put(videoFile);
                document.getElementById('post-btn').innerText = "Uploading Media...";
                document.getElementById('post-btn').disabled = true;

                uploadTask.then(snapshot => snapshot.ref.getDownloadURL()).then(downloadUrl => {
                    finalizePostCreation(postKey, text, downloadUrl);
                }).catch(err => alert(err.message));
            } else {
                finalizePostCreation(postKey, text, null);
            }
        }

        function finalizePostCreation(key, text, videoUrl) {
            db.ref('posts/' + key).set({
                id: key, uid: currentUserData.uid, username: currentUserData.username,
                content: text, videoUrl: videoUrl, likes: 0, timestamp: firebase.database.ServerValue.TIMESTAMP
            }).then(() => {
                document.getElementById('post-input').value = '';
                document.getElementById('post-video-file').value = '';
                document.getElementById('video-file-name').innerText = '';
                document.getElementById('post-btn').innerText = "Broadcast";
                document.getElementById('post-btn').disabled = false;
            });
        }

        function likePost(postId, currentLikes, authorUid) {
            db.ref('posts/' + postId).update({ likes: (currentLikes || 0) + 1 });
            if (authorUid && authorUid !== activeUid) {
                db.ref('users/' + authorUid + '/likes').transaction(curr => (curr || 0) + 1);
            }
        }

        // SPAM-PROOF ANTI-GLITCH FOLLOW TRANSACTION LOGIC
        function toggleFollowUser(targetUid) {
            if (activeUid === targetUid) return;
            const myFollowingRef = db.ref(`following/${activeUid}/${targetUid}`);
            const theirFollowersRef = db.ref(`followers/${targetUid}/${activeUid}`);
            const targetStatsRef = db.ref(`users/${targetUid}`);
            const myStatsRef = db.ref(`users/${activeUid}`);

            myFollowingRef.once('value', (snapshot) => {
                if (snapshot.exists()) {
                    myFollowingRef.remove();
                    theirFollowersRef.remove();
                    targetStatsRef.child('followers').transaction(c => (c || 1) - 1);
                    myStatsRef.child('following').transaction(c => (c || 1) - 1);
                } else {
                    myFollowingRef.set(true);
                    theirFollowersRef.set(true);
                    targetStatsRef.child('followers').transaction(c => (c || 0) + 1);
                    myStatsRef.child('following').transaction(c => (c || 0) + 1);
                }
                updateFollowButtonUI(targetUid, `feed-follow-btn-${targetUid}`);
                if (viewedProfileUid === targetUid) updateProfileModalCounters(targetUid);
            });
        }

        function updateFollowButtonUI(targetUid, elementId) {
            const btn = document.getElementById(elementId);
            const modalBtn = document.getElementById('p-follow-btn');
            db.ref(`following/${activeUid}/${targetUid}`).once('value', (snapshot) => {
                const isFollowing = snapshot.exists();
                const text = isFollowing ? "Following" : "Follow Account";
                const styling = isFollowing ? "px-4 py-2 bg-zinc-800 text-zinc-400 font-bold rounded-xl text-xs border border-zinc-700" : "px-4 py-2 bg-blue-600 text-white font-bold rounded-xl text-xs hover:bg-blue-700";
                
                if(btn) {
                    btn.innerText = isFollowing ? "Following" : "Follow";
                    btn.className = isFollowing ? "px-3 py-1 bg-zinc-800 text-zinc-400 font-bold rounded-full text-[10px] border border-zinc-700 uppercase" : "px-3 py-1 bg-red-600 text-white font-bold rounded-full text-[10px] uppercase shadow-sm";
                }
                if(modalBtn && viewedProfileUid === targetUid) {
                    modalBtn.innerText = text;
                    modalBtn.className = styling;
                }
            });
        }

        // DYNAMIC PROFILE DROPDOWN SYSTEM USER SEARCH
        function handleUserSearch(query) {
            const dropdown = document.getElementById('search-results-dropdown');
            if (!query.trim()) {
                dropdown.classList.add('hidden');
                return;
            }

            db.ref('users').orderByChild('username').startAt(query).endAt(query + "\uf8ff").once('value', (snapshot) => {
                dropdown.innerHTML = '';
                if (!snapshot.exists()) {
                    dropdown.innerHTML = `<div class="p-2 text-xs text-zinc-500 font-medium text-center">No results for "${query}"</div>`;
                    dropdown.classList.remove('hidden');
                    return;
                }

                snapshot.forEach((child) => {
                    const user = child.val();
                    const uid = child.key;
                    const badgeHtml = user.verified ? `<img src="${RED_CHECKMARK_URL}" class="w-3 h-3 inline ml-1" />` : '';

                    const row = document.createElement('div');
                    row.className = "flex items-center space-x-2.5 p-2 hover:bg-zinc-800 rounded-lg cursor-pointer transition-colors my-0.5";
                    row.onclick = () => {
                        dropdown.classList.add('hidden');
                        document.getElementById('top-search-input').value = '';
                        openProfileView(uid);
                    };
                    row.innerHTML = `
                        <img src="${user.avatarUrl || 'https://via.placeholder.com/150'}" class="w-7 h-7 rounded-full object-cover border border-zinc-700" />
                        <span class="text-xs font-bold text-zinc-200 flex items-center">${user.username} ${badgeHtml}</span>
                    `;
                    dropdown.appendChild(row);
                });
                dropdown.classList.remove('hidden');
            });
        }

        // PROFILE CONTROL PANEL LAYER
        function openProfileView(profileUid) {
            viewedProfileUid = profileUid;
            document.getElementById('view-profile-modal').classList.remove('hidden');
            document.getElementById('p-edit-form').classList.add('hidden');
            updateProfileModalCounters(profileUid);

            const isMe = profileUid === activeUid;
            document.getElementById('p-edit-btn').classList.toggle('hidden', !isMe);
            document.getElementById('p-follow-btn').classList.toggle('hidden', isMe);
            document.getElementById('p-chat-btn').classList.toggle('hidden', isMe);

            if(!isMe) updateFollowButtonUI(profileUid, null);
            loadPersonalProfileFeed(profileUid);
        }

        function updateProfileModalCounters(profileUid) {
            db.ref(`users/${profileUid}`).once('value', snapshot => {
                const profile = snapshot.val() || {};
                const badgeHtml = profile.verified ? `<img src="${RED_CHECKMARK_URL}" class="w-4 h-4 inline-block ml-1" alt="Verified" />` : '';
                
                if (profile.avatarUrl) {
                    document.getElementById('p-avatar').innerHTML = `<img src="${profile.avatarUrl}" class="w-full h-full object-cover" />`;
                } else {
                    document.getElementById('p-avatar').innerText = (profile.username || "?").charAt(0).toUpperCase();
                }
                
                document.getElementById('p-name').innerHTML = `${profile.username || 'Unknown Profile'} ${badgeHtml}`;
                document.getElementById('p-bio').innerText = profile.bio || "No description established yet.";
                document.getElementById('p-stat-following').innerText = profile.following || 0;
                document.getElementById('p-stat-followers').innerText = profile.followers || 0;
                document.getElementById('p-stat-likes').innerText = profile.likes || 0;
            });
        }

        function loadPersonalProfileFeed(profileUid) {
            const container = document.getElementById('profile-personal-feed');
            container.innerHTML = '';
            db.ref('posts').orderByChild('uid').equalTo(profileUid).once('value', snapshot => {
                if(!snapshot.exists()) {
                    container.innerHTML = `<div class="p-4 text-xs text-zinc-600 italic text-center">No structural broadcasts found.</div>`;
                    return;
                }
                let posts = [];
                snapshot.forEach(c => { posts.push(c.val()); });
                posts.reverse().forEach(post => {
                    const postCard = document.createElement('div');
                    postCard.className = "p-3 bg-zinc-950 border border-zinc-800 rounded-xl text-xs";
                    postCard.innerHTML = `<div class="text-zinc-400 mb-1">${new Date(post.timestamp).toLocaleDateString()}</div><div>${formatPostContent(post.content)}</div>`;
                    container.appendChild(postCard);
                });
            });
        }

        function toggleProfileEditForm() {
            const form = document.getElementById('p-edit-form');
            form.classList.toggle('hidden');
            if(!form.classList.contains('hidden')) {
                document.getElementById('edit-p-username').value = currentUserData.username;
                document.getElementById('edit-p-bio').value = currentUserData.bio || '';
            }
        }

        function handleSaveProfileEdits(e) {
            e.preventDefault();
            const newName = document.getElementById('edit-p-username').value.trim();
            const newBio = document.getElementById('edit-p-bio').value.trim();
            const avatarFile = document.getElementById('edit-p-avatar-file').files[0];
            const saveBtn = document.getElementById('profile-save-btn');

            if(!newName) return;
            saveBtn.innerText = "Synchronizing Configuration...";
            saveBtn.disabled = true;

            const updates = { username: newName, bio: newBio };

            if (avatarFile) {
                const fileRef = storage.ref(`avatars/${activeUid}_${avatarFile.name}`);
                fileRef.put(avatarFile).then(snap => snap.ref.getDownloadURL()).then(url => {
                    updates.avatarUrl = url;
                    return db.ref(`users/${activeUid}`).update(updates);
                }).then(() => { finalizeProfileUIRefresh(); }).catch(err => alert(err.message));
            } else {
                db.ref(`users/${activeUid}`).update(updates).then(() => { finalizeProfileUIRefresh(); });
            }
        }

        function finalizeProfileUIRefresh() {
            const saveBtn = document.getElementById('profile-save-btn');
            saveBtn.innerText = "Save Profile Configurations";
            saveBtn.disabled = false;
            document.getElementById('edit-p-avatar-file').value = '';
            toggleProfileEditForm();
            openProfileView(activeUid);
        }

        function triggerProfileFollowMutation() {
            if(viewedProfileUid) toggleFollowUser(viewedProfileUid);
        }

        function closeProfileView() { document.getElementById('view-profile-modal').classList.add('hidden'); }

        // VERTICAL STACKED MESSAGES OVERVIEW INBOX (WhatsApp-Style Architecture)
        function loadWhatsAppInbox() {
            const container = document.getElementById('whatsapp-inbox-container');
            db.ref(`chats/${activeUid}`).on('value', (snapshot) => {
                container.innerHTML = '';
                if (!snapshot.exists()) {
                    container.innerHTML = `<div class="p-8 text-xs text-zinc-600 text-center font-semibold">No secure network messaging threads logged.</div>`;
                    return;
                }

                let chatThreads = [];
                snapshot.forEach(child => {
                    chatThreads.push({ uid: child.key, meta: child.val() });
                });
                chatThreads.sort((a,b) => (b.meta.lastTimestamp || 0) - (a.meta.lastTimestamp || 0));

                chatThreads.forEach(thread => {
                    db.ref(`users/${thread.uid}`).once('value', userSnap => {
                        const profile = userSnap.val() || {};
                        const badgeHtml = profile.verified ? `<img src="${RED_CHECKMARK_URL}" class="w-3.5 h-3.5 inline-block ml-1" />` : '';
                        
                        const row = document.createElement('div');
                        row.className = "flex items-center justify-between p-4 hover:bg-zinc-900/60 transition-all cursor-pointer border-b border-zinc-800/40";
                        row.onclick = () => openDirectChatWindow(thread.uid, profile);
                        row.innerHTML = `
                            <div class="flex items-center space-x-3.5 flex-1 min-w-0">
                                <img src="${profile.avatarUrl || 'https://via.placeholder.com/150'}" class="w-11 h-11 rounded-full object-cover border border-zinc-800 flex-shrink-0" />
                                <div class="flex-1 min-w-0">
                                    <div class="flex items-baseline justify-between mb-0.5">
                                        <h3 class="text-xs font-bold text-zinc-100 truncate flex items-center tracking-wide uppercase">${profile.username || 'Network Node'} ${badgeHtml}</h3>
                                        <span class="text-[10px] text-zinc-500 font-medium whitespace-nowrap ml-2">${thread.meta.lastTimestamp ? new Date(thread.meta.lastTimestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : ''}</span>
                                    </div>
                                    <p class="text-xs text-zinc-400 truncate pr-4 font-normal">${thread.meta.lastMessage || 'Open thread session'}</p>
                                </div>
                            </div>
                        `;
                        container.appendChild(row);
                    });
                });
            });
        }

        function openDirectChatSession() {
            if(!viewedProfileUid) return;
            closeProfileView();
            switchTab('chat');
            db.ref(`users/${viewedProfileUid}`).once('value', snap => {
                openDirectChatWindow(viewedProfileUid, snap.val() || {});
            });
        }

        function openDirectChatWindow(recipientUid, profile) {
            activeChatRecipientUid = recipientUid;
            document.getElementById('active-chat-window').classList.remove('hidden');
            document.getElementById('active-chat-name').innerHTML = `${profile.username || 'User'} ${profile.verified ? `<img src="${RED_CHECKMARK_URL}" class="w-3.5 h-3.5 inline-block ml-1" />` : ''}`;
            
            if(profile.avatarUrl) {
                document.getElementById('active-chat-avatar').innerHTML = `<img src="${profile.avatarUrl}" class="w-full h-full object-cover" />`;
            } else {
                document.getElementById('active-chat-avatar').innerText = (profile.username || 'U').charAt(0).toUpperCase();
            }

            // Create or query unique combined messaging path key
            const combinedChatId = activeUid < recipientUid ? `${activeUid}_${recipientUid}` : `${recipientUid}_${activeUid}`;
            
            db.ref(`messages/${combinedChatId}`).orderByChild('timestamp').limitToLast(50).on('value', snapshot => {
                const msgContainer = document.getElementById('chat-messages-container');
                msgContainer.innerHTML = '';
                if(!snapshot.exists()) return;

                snapshot.forEach(child => {
                    const data = child.val();
                    const isMe = data.senderUid === activeUid;
                    const row = document.createElement('div');
                    row.className = `flex ${isMe ? 'justify-end' : 'justify-start'}`;
                    row.innerHTML = `
                        <div class="max-w-xs rounded-2xl px-4 py-2.5 shadow-md ${isMe ? 'bg-red-600 text-white rounded-br-none' : 'bg-zinc-800 text-zinc-100 rounded-bl-none'}">
                            <p class="leading-relaxed font-normal">${data.text}</p>
                            <span class="block text-[9px] text-right mt-1 opacity-60">${new Date(data.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                        </div>
                    `;
                    msgContainer.appendChild(row);
                });
                msgContainer.scrollTop = msgContainer.scrollHeight;
            });
        }

        function handleSendPrivateMessage(e) {
            e.preventDefault();
            if(!activeChatRecipientUid) return;
            const input = document.getElementById('chat-input');
            const messageText = input.value.trim();
            if(!messageText) return;

            const combinedChatId = activeUid < activeChatRecipientUid ? `${activeUid}_${activeChatRecipientUid}` : `${activeChatRecipientUid}_${activeUid}`;
            const timestamp = firebase.database.ServerValue.TIMESTAMP;

            const messageObj = {
                senderUid: activeUid,
                text: messageText,
                timestamp: timestamp
            };

            db.ref(`messages/${combinedChatId}`).push(messageObj).then(() => {
                // Update modern index summary nodes for both users securely
                db.ref(`chats/${activeUid}/${activeChatRecipientUid}`).set({ lastMessage: messageText, lastTimestamp: timestamp });
                db.ref(`chats/${activeChatRecipientUid}/${activeUid}`).set({ lastMessage: messageText, lastTimestamp: timestamp });
                input.value = '';
            });
        }

        function closeActiveChatWindow() {
            document.getElementById('active-chat-window').classList.add('hidden');
            activeChatRecipientUid = null;
        }
    </script>
</body>
</html>
