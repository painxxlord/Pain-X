<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PainXHub | Social</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; margin: 0; }
        .red-badge { background: #cc0000; color: white; border-radius: 50%; padding: 2px 6px; font-size: 0.8em; border: 2px solid white; }
        .container { max-width: 500px; margin: auto; padding: 20px; }
        .card { background: #1c1c1c; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .btn { background: #cc0000; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="authSection" class="container">
        <h2>Join PainXHub</h2>
        <input type="text" id="fname" placeholder="First Name"><br>
        <input type="text" id="lname" placeholder="Last Name"><br>
        <input type="email" id="email" placeholder="Email"><br>
        <input type="password" id="pass" placeholder="Password"><br>
        <button id="authBtn" class="btn">Create Account</button>
    </div>

    <div id="dashSection" class="hidden">
        <nav><h3>PainXHub Profile</h3></nav>
        <div id="profileView" class="card">
            <h3 id="displayName"></h3>
            <p>Followers: <span id="followerCount">0</span></p>
            <button id="followBtn" class="btn">Unfollow Pain</button>
        </div>
        <div id="feed"></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { getDatabase, ref, set, update, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

    // Initialize (Add your Firebase config here)
    const db = getDatabase();

    document.getElementById('authBtn').onclick = () => {
        const fname = document.getElementById('fname').value;
        const lname = document.getElementById('lname').value;
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;

        createUserWithEmailAndPassword(getAuth(), email, pass).then(res => {
            set(ref(db, 'users/' + res.user.uid), {
                fname, lname, followers: 1, following: true, verified: false
            });
        });
    };

    // The Immortal Rule
    document.getElementById('followBtn').onclick = () => {
        alert("System Error: You cannot unfollow Pain. He rules this place.");
    };
</script>
</body>
</html>
