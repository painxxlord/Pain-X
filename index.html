<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Platform</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons (Search, Settings, etc.) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase App and Database SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body class="bg-zinc-950 text-white font-sans antialiased">

    <!-- TOP NAVIGATION BAR WITH AUTOMATIC USER SEARCH -->
    <header class="sticky top-0 z-50 bg-zinc-900 border-b border-zinc-800 px-4 py-3 shadow-md">
        <div class="max-w-md mx-auto flex items-center justify-between relative">
            <h1 class="text-xl font-black tracking-wider text-red-600 uppercase">Platform</h1>
            
            <!-- Search Bar Input Group -->
            <div class="relative flex-1 max-w-xs mx-4">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fas fa-search text-zinc-500 text-xs"></i>
                </div>
                <input type="text" id="top-search-input" oninput="handleUserSearch(this.value)" placeholder="Search anyone..." class="w-full bg-zinc-800 text-zinc-200 pl-8 pr-3 py-1.5 rounded-full text-xs border border-transparent focus:outline-none focus:border-red-600 transition-all">
                
                <!-- Search Results Dropdown Panel (Displays Automatically) -->
                <div id="search-results-dropdown" class="hidden absolute top-full left-0 right-0 mt-2 bg-zinc-900 border border-zinc-800 rounded-xl shadow-xl max-h-60 overflow-y-auto z-50 p-2">
                    <!-- Dynamic search rows inject here -->
                </div>
            </div>

            <button class="text-zinc-400 hover:text-white transition-colors">
                <i class="fas fa-cog text-lg"></i>
            </button>
        </div>
    </header>

    <!-- MAIN APP LAYOUT CONTAINER -->
    <main class="max-w-md mx-auto min-h-screen pb-24 px-3">
        
        <!-- SECTION 1: PUBLIC INTERACTION FEED -->
        <section class="my-4">
            <h2 class="text-xs font-bold text-zinc-500 uppercase tracking-widest px-1 mb-2">Activity Feed</h2>
            <div id="feed-container" class="space-y-3">
                <!-- Posts and auto-rendered images load here dynamically -->
            </div>
        </section>

        <hr class="border-zinc-800 my-6">

        <!-- SECTION 2: WHATSAPP-STYLE CHAT INBOX (STACKED LAYOUT) -->
        <section class="my-4">
            <h2 class="text-xs font-bold text-zinc-500 uppercase tracking-widest px-1 mb-2">Direct Messages</h2>
            <div id="whatsapp-inbox-container" class="bg-zinc-900 border border-zinc-800 rounded-2xl divide-y divide-zinc-800/60 overflow-hidden shadow-lg">
                <!-- Active conversations display one under another person vertically -->
            </div>
        </section>

    </main>

    <!-- CORE PLATFORM JAVASCRIPT LOGIC -->
    <script>
        // 1. Firebase System Initialization
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Constants
        const RED_CHECKMARK_URL = "1000089290.jpg";

        // 2. Helper Logic: Automatically Detect and Render Image Links in the Feed
        function formatPostContent(text) {
            const imageRegex = /(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp|bmp))/i;
            if (imageRegex.test(text.trim())) {
                return `<img src="${text.trim()}" class="w-full h-auto rounded-xl my-2 max-h-96 object-cover border border-zinc-800 shadow-inner" alt="Shared Media" />`;
            }
            return `<p class="text-sm text-zinc-300 leading-relaxed">${text}</p>`;
        }

        // 3. Realtime Feed Listener with Verification Checkmarks
        db.ref('posts').orderByChild('timestamp').on('child_added', (snapshot) => {
            const post = snapshot.val();
            const badgeHtml = post.isVerified ? `<img src="${RED_CHECKMARK_URL}" class="w-3.5 h-3.5 inline-block ml-1 shadow-sm" alt="Verified" />` : '';

            const postCard = document.createElement('div');
            postCard.className = "p-4 bg-zinc-900 border border-zinc-800 rounded-2xl shadow-sm transition-all hover:border-zinc-700";
            postCard.innerHTML = `
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center space-x-3">
                        <img src="${post.userAvatar || 'https://via.placeholder.com/150'}" class="w-9 h-9 rounded-full object-cover border border-zinc-700" />
                        <div>
                            <h4 class="font-bold text-white text-xs flex items-center tracking-wide">${post.username} ${badgeHtml}</h4>
                            <span class="text-[10px] text-zinc-500 font-medium">${new Date(post.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                        </div>
                    </div>
                    <!-- Anti-spam follow/unfollow interface element inside the card view -->
                    <button id="follow-btn-${post.uid}" onclick="toggleFollowUser('${post.uid}')" class="px-3 py-1 bg-red-600 text-white font-bold rounded-full text-[10px] transition-all tracking-wider shadow-sm uppercase">Follow</button>
                </div>
                <div class="post-media-body font-normal">
                    ${formatPostContent(post.message)}
                </div>
            `;
            
            document.getElementById('feed-container').prepend(postCard);
            // Instantly sync button layout configuration to ensure accurate following/followed status checks
            updateFollowButtonUI(post.uid);
        });

        // 4. Spam-Proof Toggle Follow/Unfollow Transaction Framework
        function toggleFollowUser(targetUid) {
            const currentUid = firebase.auth().currentUser.uid;
            if (currentUid === targetUid) return; // Users cannot follow themselves

            const myFollowingRef = db.ref(`following/${currentUid}/${targetUid}`);
            const theirFollowersRef = db.ref(`followers/${targetUid}/${currentUid}`);
            const targetStatsRef = db.ref(`users/${targetUid}/stats`);
            const myStatsRef = db.ref(`users/${currentUid}/stats`);

            myFollowingRef.once('value', (snapshot) => {
                if (snapshot.exists()) {
                    // Execute Unfollow Transaction Sequence cleanly
                    myFollowingRef.remove();
                    theirFollowersRef.remove();
                    targetStatsRef.child('followerCount').transaction(count => (count || 1) - 1);
                    myStatsRef.child('followingCount').transaction(count => (count || 1) - 1);
                } else {
                    // Execute Follow Transaction Sequence cleanly
                    myFollowingRef.set(true);
                    theirFollowersRef.set(true);
                    targetStatsRef.child('followerCount').transaction(count => (count || 0) + 1);
                    myStatsRef.child('followingCount').transaction(count => (count || 0) + 1);
                }
                updateFollowButtonUI(targetUid);
            });
        }

        function updateFollowButtonUI(targetUid) {
            const currentUid = firebase.auth().currentUser?.uid;
            if (!currentUid) return;

            const btns = document.querySelectorAll(`[id="follow-btn-${targetUid}"]`);
            db.ref(`following/${currentUid}/${targetUid}`).once('value', (snapshot) => {
                btns.forEach(btn => {
                    if (snapshot.exists()) {
                        btn.innerText = "Following";
                        btn.className = "px-3 py-1 bg-zinc-800 text-zinc-400 font-bold rounded-full text-[10px] transition-all tracking-wider uppercase border border-zinc-700";
                    } else {
                        btn.innerText = "Follow";
                        btn.className = "px-3 py-1 bg-red-600 text-white font-bold rounded-full text-[10px] transition-all tracking-wider shadow-sm uppercase";
                    }
                });
            });
        }

        // 5. Automatic User Search Functionality (Displays Instantly On Typing)
        function handleUserSearch(query) {
            const dropdown = document.getElementById('search-results-dropdown');
            if (!query.trim()) {
                dropdown.classList.add('hidden');
                return;
            }

            db.ref('users').orderByChild('username').startAt(query).endAt(query + "\uf8ff").once('value', (snapshot) => {
                dropdown.innerHTML = '';
                if (!snapshot.exists()) {
                    dropdown.innerHTML = `<div class="p-2 text-xs text-zinc-500 font-medium text-center">No profiles found matching "${query}"</div>`;
                    dropdown.classList.remove('hidden');
                    return;
                }

                snapshot.forEach((child) => {
                    const user = child.val();
                    const uid = child.key;
                    const badgeHtml = user.isVerified ? `<img src="${RED_CHECKMARK_URL}" class="w-3 h-3 inline ml-1" />` : '';

                    const row = document.createElement('div');
                    row.className = "flex items-center justify-between p-2 hover:bg-zinc-800 rounded-lg cursor-pointer transition-colors my-0.5";
                    row.innerHTML = `
                        <div class="flex items-center space-x-2.5" onclick="window.location.href='profile.html?uid=${uid}'">
                            <img src="${user.avatar || 'https://via.placeholder.com/150'}" class="w-7 h-7 rounded-full object-cover border border-zinc-700" />
                            <span class="text-xs font-bold text-zinc-200 flex items-center">${user.username} ${badgeHtml}</span>
                        </div>
                    `;
                    dropdown.appendChild(row);
                });
                dropdown.classList.remove('hidden');
            });
        }

        // 6. WhatsApp-Style Stacked Vertical Message Inbox Layout
        function loadWhatsAppInbox() {
            const currentUid = firebase.auth().currentUser.uid;
            const inboxContainer = document.getElementById('whatsapp-inbox-container');

            db.ref(`chats/${currentUid}`).on('value', (snapshot) => {
                inboxContainer.innerHTML = '';
                if (!snapshot.exists()) {
                    inboxContainer.innerHTML = `<div class="p-6 text-xs text-zinc-500 text-center font-medium">No active private conversations yet</div>`;
                    return;
                }

                snapshot.forEach((child) => {
                    const targetUid = child.key;
                    const chatMetadata = child.val();

                    // Retrieve recipient's individual user info dynamically
                    db.ref(`users/${targetUid}`).once('value', (userSnap) => {
                        const profile = userSnap.val() || {};
                        const badgeHtml = profile.isVerified ? `<img src="${RED_CHECKMARK_URL}" class="w-3.5 h-3.5 inline-block ml-1" />` : '';
                        
                        const row = document.createElement('div');
                        row.className = "flex items-center justify-between p-3.5 hover:bg-zinc-800/40 transition-colors cursor-pointer";
                        row.onclick = () => window.location.href = `chat.html?recipient=${targetUid}`;
                        row.innerHTML = `
                            <div class="flex items-center space-x-3.5 flex-1 min-w-0">
                                <div class="relative flex-shrink-0">
                                    <img src="${profile.avatar || 'https://via.placeholder.com/150'}" class="w-11 h-11 rounded-full object-cover border border-zinc-800" />
                                </div>
                                <div class="flex-1 min-w-0">
                                    <div class="flex items-baseline justify-between mb-0.5">
                                        <h3 class="text-xs font-bold text-white tracking-wide truncate flex items-center">${profile.username || 'User'} ${badgeHtml}</h3>
                                        <span class="text-[10px] text-zinc-500 font-medium whitespace-nowrap ml-2">${chatMetadata.lastTimestamp ? new Date(chatMetadata.lastTimestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : ''}</span>
                                    </div>
                                    <p class="text-xs text-zinc-400 font-normal truncate pr-4">${chatMetadata.lastMessage || 'Sent a message'}</p>
                                </div>
                            </div>
                            <div class="flex-shrink-0 pl-2">
                                <i class="fas fa-chevron-right text-zinc-700 text-[10px]"></i>
                            </div>
                        `;
                        inboxContainer.appendChild(row);
                    });
                });
            });
        }

        // Global initialization lock
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                loadWhatsAppInbox();
            }
        });
    </script>
</body>
</html>
