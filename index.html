<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PainXHub | Official</title>
    <style>
        :root { --red: #cc0000; --dark: #05070a; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; }
        .hidden { display: none !important; }
        .card { background: #111827; border: 1px solid var(--red); padding: 20px; border-radius: 12px; margin: 10px; }
        .btn { background: var(--red); color: white; padding: 10px; border: none; border-radius: 6px; cursor: pointer; }
        .badge { color: #3b82f6; font-size: 0.8em; margin-left: 5px; }
    </style>
</head>
<body>

    <div id="authSection" class="card" style="max-width:400px; margin: 100px auto;">
        <h2>Join the Akatsuki</h2>
        <input type="email" id="email" placeholder="Email" style="width:100%; padding:10px; margin-bottom:10px;">
        <input type="password" id="pass" placeholder="Password" style="width:100%; padding:10px; margin-bottom:10px;">
        <button id="authBtn" class="btn" style="width:100%;">Enter Hub Space</button>
    </div>

    <div id="dashSection" class="hidden">
        <header style="padding:20px; border-bottom:1px solid var(--red);">
            <h3>PainXHub <span class="badge">✔ Verified</span></h3>
            <button id="logoutBtn" class="btn">Logout</button>
        </header>

        <div style="padding:20px;">
            <div class="card">
                <h4>My Profile</h4>
                <p>Status: Akatsuki Member <span class="badge">✔</span></p>
            </div>

            <div class="card">
                <h4>AI Projects & Hub</h4>
                <div id="aiContent">Loading AI Tools...</div>
            </div>

            <div class="card">
                <h4>Live Feed</h4>
                <textarea id="postText" style="width:100%; background:#000; color:white;"></textarea>
                <button id="postBtn" class="btn">Publish Post</button>
                <div id="feed"></div>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

    const app = initializeApp({
        apiKey: "AIzaSyAN4oKAF6Od2u6aMOBk8G9u4Xa2QyRFWio",
        authDomain: "painakatsukihub-33fa6.firebaseapp.com",
        projectId: "painakatsukihub-33fa6",
        storageBucket: "painakatsukihub-33fa6.firebasestorage.app",
        messagingSenderId: "327168157848",
        appId: "1:327168157848:web:49f6f22ed027cbb48608ed"
    });

    const auth = getAuth(app);
    const db = getDatabase(app);

    document.getElementById('authBtn').onclick = () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        createUserWithEmailAndPassword(auth, e, p).catch(() => signInWithEmailAndPassword(auth, e, p));
    };

    onAuthStateChanged(auth, user => {
        if(user) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('dashSection').classList.remove('hidden');
            
            // Load Feed
            onValue(ref(db, 'posts'), snap => {
                const feed = document.getElementById('feed');
                feed.innerHTML = "";
                snap.forEach(c => feed.innerHTML += `<div class="card">${c.val().text}</div>`);
            });
        }
    });

    document.getElementById('postBtn').onclick = () => {
        push(ref(db, 'posts'), { text: document.getElementById('postText').value });
    };

    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());
</script>
</body>
</html>
