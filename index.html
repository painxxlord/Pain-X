<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pain-X Community</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase App and Database CDNs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen font-sans">

    <!-- Firebase Configuration Block -->
    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyAN4oKAF6Od2u6aMOBk8G9u4Xa2QyRFWio",
        authDomain: "painakatsukihub-33fa6.firebaseapp.com",
        databaseURL: "https://painakatsukihub-33fa6-default-rtdb.firebaseio.com",
        projectId: "painakatsukihub-33fa6",
        storageBucket: "painakatsukihub-33fa6.firebasestorage.app",
        messagingSenderId: "327168157848",
        appId: "1:327168157848:web:49f6f22ed027cbb48608ed",
        measurementId: "G-BMWZZVHTWB"
      };

      // Initialize Firebase
      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }
      const auth = firebase.auth();
      const db = firebase.database();
    </script>

    <!-- Top Navigation -->
    <nav class="border-b border-zinc-800 bg-zinc-900/50 backdrop-blur sticky top-0 z-50 px-4 py-3">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black tracking-wider text-red-500">PAIN-X</h1>
            <div id="nav-user-info" class="hidden items-center gap-4">
                <span id="user-display-name" class="font-medium text-sm text-zinc-300"></span>
                <button onclick="logoutUser()" class="text-xs bg-zinc-800 hover:bg-zinc-700 px-3 py-1.5 rounded-md transition font-medium">Log Out</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <!-- Left Side: Auth Section -->
        <div class="md:col-span-1">
            <div id="auth-card" class="bg-zinc-900 border border-zinc-800 rounded-xl p-5 sticky top-20">
                <div class="text-center mb-6">
                    <div class="w-16 h-16 bg-red-950/50 border border-red-500/30 text-red-500 rounded-full flex items-center justify-center text-2xl font-black mx-auto mb-2 shadow-lg shadow-red-500/10">P</div>
                    <h2 id="auth-title" class="text-lg font-bold">Create Account</h2>
                    <p id="auth-subtitle" class="text-xs text-zinc-400 mt-1">Join the network to start posting</p>
                </div>

                <form id="auth-form" onsubmit="handleAuth(event)" class="space-y-4">
                    <div id="name-field-container">
                        <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-1">Your Name</label>
                        <input type="text" id="auth-name" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-red-500 transition" placeholder="e.g., Pain">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-1">Email Address</label>
                        <input type="email" id="auth-email" required class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-red-500 transition" placeholder="name@example.com">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-1">Password</label>
                        <input type="password" id="auth-password" required class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-red-500 transition" placeholder="••••••••">
                    </div>

                    <button type="submit" id="auth-submit-btn" class="w-full bg-red-600 hover:bg-red-700 active:bg-red-800 text-white font-semibold py-2 rounded-lg text-sm transition mt-2 shadow-lg shadow-red-600/10">Register</button>
                </form>

                <div class="text-center mt-4">
                    <button onclick="toggleAuthMode()" id="auth-toggle-btn" class="text-xs text-zinc-400 hover:text-red-400 transition">Already registered? <span class="text-red-500 font-medium">Log In</span></button>
                </div>
            </div>

            <!-- Profile Info Box (Shown when logged in) -->
            <div id="profile-card" class="hidden bg-zinc-900 border border-zinc-800 rounded-xl p-5 text-center sticky top-20">
                <div id="profile-avatar" class="w-16 h-16 bg-zinc-800 border border-zinc-700 text-zinc-300 rounded-full flex items-center justify-center text-2xl font-bold mx-auto mb-3">?</div>
                <h2 id="profile-name" class="text-lg font-bold flex items-center justify-center gap-1.5"></h2>
                <p id="profile-email" class="text-xs text-zinc-500 mt-0.5"></p>
                <div class="mt-4 pt-4 border-t border-zinc-800/60 flex justify-around text-center">
                    <div>
                        <span class="block text-xs text-zinc-500 font-medium uppercase tracking-wider">Status</span>
                        <span class="text-xs text-emerald-500 font-bold bg-emerald-500/10 px-2 py-0.5 rounded-full inline-block mt-1">Active</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Side: Feed Section -->
        <div class="md:col-span-2 space-y-4">
            <!-- Composer -->
            <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-4">
                <form onsubmit="handlePostSubmit(event)">
                    <textarea id="post-input" required rows="3" class="w-full bg-zinc-950 border border-zinc-800/80 rounded-lg p-3 text-sm focus:outline-none focus:border-red-500 transition resize-none placeholder-zinc-500" placeholder="What's happening? Share an update..."></textarea>
                    <div class="flex justify-end mt-2">
                        <button type="submit" id="post-btn" disabled class="bg-red-600/50 cursor-not-allowed text-white text-xs font-bold px-4 py-2 rounded-lg transition shadow-lg">Post Broadcast</button>
                    </div>
                </form>
            </div>

            <!-- Feed Container -->
            <div id="global-feed" class="space-y-3">
                <div class="text-center py-8 text-zinc-500 text-sm">Loading community broadcast feed...</div>
            </div>
        </div>
    </main>

    <!-- App Logic Operations Script -->
    <script>
        let isSignUpMode = true;
        let currentUserData = null;

        function toggleAuthMode() {
            isSignUpMode = !isSignUpMode;
            const title = document.getElementById('auth-title');
            const subtitle = document.getElementById('auth-subtitle');
            const nameField = document.getElementById('name-field-container');
            const submitBtn = document.getElementById('auth-submit-btn');
            const toggleBtn = document.getElementById('auth-toggle-btn');

            if (isSignUpMode) {
                title.innerText = "Create Account";
                subtitle.innerText = "Join the network to start posting";
                nameField.classList.remove('hidden');
                submitBtn.innerText = "Register";
                toggleBtn.innerHTML = 'Already registered? <span class="text-red-500 font-medium">Log In</span>';
            } else {
                title.innerText = "Welcome Back";
                subtitle.innerText = "Sign in to your dashboard network";
                nameField.classList.add('hidden');
                submitBtn.innerText = "Sign In";
                toggleBtn.innerHTML = 'Need an account? <span class="text-red-500 font-medium">Sign Up</span>';
            }
        }

        function handleAuth(e) {
            e.preventDefault();
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            const name = document.getElementById('auth-name').value.trim();

            if (isSignUpMode) {
                if(!name) return alert("Please type your profile name.");
                auth.createUserWithEmailAndPassword(email, password)
                    .then((userCredential) => {
                        const uid = userCredential.user.uid;
                        return db.ref('users/' + uid).set({
                            username: name,
                            email: email,
                            uid: uid,
                            verified: false,
                            joinedAt: firebase.database.ServerValue.TIMESTAMP
                        });
                    })
                    .catch(err => alert("Registration Blocked: " + err.message));
            } else {
                auth.signInWithEmailAndPassword(email, password)
                    .catch(err => alert("Login Failed: " + err.message));
            }
        }

        function logoutUser() {
            auth.signOut();
        }

        function handlePostSubmit(e) {
            e.preventDefault();
            if (!currentUserData) return;
            const text = document.getElementById('post-input').value.trim();
            if (!text) return;

            db.ref('posts').push({
                uid: currentUserData.uid,
                username: currentUserData.username,
                verified: currentUserData.verified || false,
                content: text,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            }).then(() => {
                document.getElementById('post-input').value = '';
            }).catch(err => alert("Failed to post: " + err.message));
        }

        // Auth Observer
        auth.onAuthStateChanged(user => {
            const authCard = document.getElementById('auth-card');
            const profileCard = document.getElementById('profile-card');
            const navInfo = document.getElementById('nav-user-info');
            const postBtn = document.getElementById('post-btn');

            if (user) {
                db.ref('users/' + user.uid).on('value', snapshot => {
                    currentUserData = snapshot.val();
                    if (currentUserData) {
                        authCard.classList.add('hidden');
                        profileCard.classList.remove('hidden');
                        navInfo.classList.remove('hidden');
                        navInfo.classList.add('flex');

                        // Update profiles
                        document.getElementById('user-display-name').innerText = currentUserData.username;
                        document.getElementById('profile-email').innerText = currentUserData.email;
                        
                        // Icon letter
                        const firstLetter = currentUserData.username.charAt(0).toUpperCase();
                        document.getElementById('profile-avatar').innerText = firstLetter;

                        // Verification dynamic handling
                        const nameContainer = document.getElementById('profile-name');
                        if (currentUserData.verified) {
                            nameContainer.innerHTML = `${currentUserData.username} <span class="text-blue-500 text-sm" title="Verified App Administrator">✓</span>`;
                        } else {
                            nameContainer.innerText = currentUserData.username;
                        }

                        // Activate publishing controls
                        postBtn.disabled = false;
                        postBtn.classList.remove('bg-red-600/50', 'cursor-not-allowed');
                        postBtn.classList.add('bg-red-600', 'hover:bg-red-700', 'active:bg-red-800');
                    }
                });
            } else {
                currentUserData = null;
                authCard.classList.remove('hidden');
                profileCard.classList.add('hidden');
                navInfo.classList.add('hidden');
                navInfo.classList.remove('flex');

                postBtn.disabled = true;
                postBtn.classList.add('bg-red-600/50', 'cursor-not-allowed');
                postBtn.classList.remove('bg-red-600', 'hover:bg-red-700', 'active:bg-red-800');
            }
        });

        // Live Feed Tracker
        db.ref('posts').orderToLast(40).on('value', snapshot => {
            const feedContainer = document.getElementById('global-feed');
            feedContainer.innerHTML = '';
            
            const posts = [];
            snapshot.forEach(child => {
                posts.unshift({ id: child.key, ...child.val() });
            });

            if (posts.length === 0) {
                feedContainer.innerHTML = '<div class="text-center py-12 text-zinc-600 text-sm border border-dashed border-zinc-800 rounded-xl">The global stream feed is currently empty. Make the first broadcast!</div>';
                return;
            }

            posts.forEach(post => {
                const date = new Date(post.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const badge = post.verified ? '<span class="text-blue-500 text-xs ml-1" title="Verified Badge">✓</span>' : '';
                const init = post.username ? post.username.charAt(0).toUpperCase() : '?';

                const card = document.createElement('div');
                card.className = "bg-zinc-900 border border-zinc-800/80 p-4 rounded-xl flex gap-3 shadow-sm";
                card.innerHTML = `
                    <div class="w-9 h-9 rounded-full bg-zinc-800 border border-zinc-700 flex items-center justify-center font-bold text-sm text-zinc-300 shrink-0">${init}</div>
                    <div class="space-y-1 w-full">
                        <div class="flex items-center justify-between">
                            <span class="text-sm font-bold flex items-center gap-0.5 text-zinc-200">${post.username}${badge}</span>
                            <span class="text-[10px] tracking-wider font-semibold text-zinc-500 uppercase">${date}</span>
                        </div>
                        <p class="text-sm text-zinc-300 break-words leading-relaxed">${post.content}</p>
                    </div>
                `;
                feedContainer.appendChild(card);
            });
        });
    </script>
</body>
</html>
