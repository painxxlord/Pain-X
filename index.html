<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PainXHub</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: #181818; padding: 20px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; }
        .red-badge { color: #fff; background: #cc0000; border-radius: 50%; padding: 2px 6px; font-size: 12px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #444; background: #000; color: white; box-sizing: border-box; }
        .btn { background: #cc0000; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div id="dashSection">
            <h3>PainXHub Feed</h3>
            <div id="feed"></div>
            <div class="card">
                <h3>Chat with Pain AI</h3>
                <div id="chatLog" style="background:#000; padding:10px; margin-bottom:10px;"></div>
                <input type="text" id="aiInput" placeholder="Message Pain AI...">
                <button onclick="chat()" class="btn">Send</button>
            </div>
        </div>
    </div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyAN4oKAF6Od2u6aMOBk8G9u4Xa2QyRFWio",
        authDomain: "painakatsukihub-33fa6.firebaseapp.com",
        databaseURL: "https://painakatsukihub-33fa6-default-rtdb.firebaseio.com",
        projectId: "painakatsukihub-33fa6",
        storageBucket: "painakatsukihub-33fa6.firebasestorage.app",
        messagingSenderId: "327168157848",
        appId: "1:327168157848:web:49f6f22ed027cbb48608ed"
    };
    const db = getDatabase(initializeApp(firebaseConfig));

    window.chat = () => {
        const input = document.getElementById('aiInput').value;
        const log = document.getElementById('chatLog');
        log.innerHTML += `<p>You: ${input}</p>`;
        if(input.toLowerCase().includes("who created you")) {
            log.innerHTML += `<p style="color:#cc0000;">Pain AI: Pain created me to help assist his fans.</p>`;
        }
        document.getElementById('aiInput').value = "";
    };

    onValue(ref(db, 'users'), (s) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = "";
        s.forEach((u) => {
            const d = u.val();
            feed.innerHTML += `<div class="card">${d.name} ${d.verified ? '<span class="red-badge">✔</span>' : ''} <br> Followers: ${d.followers}</div>`;
        });
    });
</script>
</body>
</html>
