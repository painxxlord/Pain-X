<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control Panel</title>
    <style>
        /* Self-contained styling that loads instantly offline */
        body { background-color: #111827; color: #f3f4f6; font-family: sans-serif; margin: 0; padding: 15px; }
        .card { background-color: #1f2937; border: 1px solid #374151; padding: 20px; border-radius: 12px; margin-bottom: 15px; }
        .btn { background-color: #2563eb; color: white; padding: 10px; border: none; border-radius: 8px; width: 100%; font-weight: bold; font-size: 14px; }
        .input-box { width: 100%; background-color: #111827; border: 1px solid #374151; color: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        h1 { color: #ffffff; font-size: 24px; margin-bottom: 5px; }
        h2 { color: #ffffff; font-size: 18px; margin-top: 0; }
        .stat-num { font-size: 28px; font-weight: bold; color: #10b981; margin: 5px 0 0 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; text-align: left; }
        th { font-size: 11px; text-transform: uppercase; color: #9ca3af; padding: 10px 5px; border-b: 1px solid #374151; }
        td { padding: 12px 5px; border-bottom: 1px solid #374151; font-size: 13px; }
    </style>
</head>
<body>

    <!-- Header -->
    <div style="margin-bottom: 20px;">
        <h1>System Overview [HQ Panel]</h1>
        <div style="color: #9ca3af; font-size: 13px;">Main Admin: Pain</div>
    </div>

    <!-- Analytics Cards -->
    <div class="card">
        <div style="color: #9ca3af; font-size: 12px;">Total Registrations</div>
        <p class="stat-num" style="color: #3b82f6;">1,248</p>
    </div>
    
    <div class="card">
        <div style="color: #9ca3af; font-size: 12px;">Hologram Referral Funds</div>
        <p class="stat-num">₦6,240,000</p>
    </div>

    <!-- Post Box -->
    <div class="card">
        <h2>Publish to Feed</h2>
        <form id="publishForm">
            <input type="text" placeholder="Paste Image URL here..." class="input-box">
            <textarea placeholder="What do you want everyone to see?" rows="3" class="input-box" style="resize: none;"></textarea>
            <button type="submit" class="btn">Broadcast Post</button>
        </form>
    </div>

    <!-- Live Table -->
    <div class="card" style="overflow-x: auto;">
        <h2>Live Sign-Up Tracker</h2>
        <table>
            <thead>
                <tr>
                    <th>User</th>
                    <th>Code</th>
                    <th>Referred By</th>
                    <th>Balance</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><b>user_itachi</b></td>
                    <td style="color: #3b82f6;">ITC7712</td>
                    <td>Direct</td>
                    <td style="color: #10b981; font-weight: bold;">₦25,000</td>
                </tr>
                <tr>
                    <td><b>obito_design</b></td>
                    <td style="color: #3b82f6;">OBT9031</td>
                    <td>ITC7712</td>
                    <td style="color: #10b981; font-weight: bold;">₦5,000</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        document.getElementById('publishForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Post Broadcast Triggered!');
        });
    </script>
</body>
