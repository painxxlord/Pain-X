<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PainX Admin</title>
    <style>body { background: #000; color: white; padding: 20px; }</style>
</head>
<body>
    <h1>Admin Panel</h1>
    <div id="manageUsers"></div>

    <script type="module">
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
        const db = getDatabase();

        onValue(ref(db, 'users'), (snap) => {
            const container = document.getElementById('manageUsers');
            container.innerHTML = "";
            snap.forEach((user) => {
                const data = user.val();
                container.innerHTML += `
                    <div>
                        ${data.fname} ${data.lname} - Followers: ${data.followers}
                        ${data.followers >= 1000 ? '<span class="red-badge">✔</span>' : ''}
                        <button onclick="verify('${user.key}')">Grant Verification</button>
                    </div>`;
            });
        });

        window.verify = (uid) => update(ref(db, 'users/' + uid), { verified: true });
    </script>
</body>
</html>
