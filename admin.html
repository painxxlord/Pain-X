<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control Panel</title>
    <style>
        body { background-color: #111827; color: #f3f4f6; font-family: sans-serif; margin: 0; padding: 15px; }
        .card { background-color: #1f2937; border: 1px solid #374151; padding: 20px; border-radius: 12px; margin-bottom: 15px; }
        .btn { background-color: #2563eb; color: white; padding: 10px; border: none; border-radius: 8px; width: 100%; font-weight: bold; font-size: 14px; cursor: pointer; }
        .input-box { width: 100%; background-color: #111827; border: 1px solid #374151; color: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        h1 { color: #ffffff; font-size: 24px; margin-bottom: 5px; }
        h2 { color: #ffffff; font-size: 18px; margin-top: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; text-align: left; }
        th { font-size: 11px; text-transform: uppercase; color: #9ca3af; padding: 10px 5px; border-bottom: 1px solid #374151; }
        td { padding: 12px 5px; border-bottom: 1px solid #374151; font-size: 13px; }
    </style>
</head>
<body>

    <div style="margin-bottom: 20px;">
        <h1>System Overview [HQ Panel]</h1>
        <div style="color: #9ca3af; font-size: 13px;">Main Admin: Pain</div>
    </div>

    <!-- Post Box -->
    <div class="card">
        <h2>Publish to Feed</h2>
        <form id="publishForm">
            <input type="text" id="title" placeholder="Post Title (e.g., System Update)" class="input-box" required>
            <textarea id="content" placeholder="What do you want everyone to see?" rows="3" class="input-box" style="resize: none;" required></textarea>
            <button type="submit" class="btn">Broadcast Post</button>
        </form>
    </div>

    <!-- Live Table Tracker -->
    <div class="card" style="overflow-x: auto;">
        <h2>Live Sign-Up & Balance Tracker</h2>
        <table>
            <thead>
                <tr>
                    <th>User Email</th>
                    <th>Referral Code</th>
                    <th>Uses (Max 3)</th>
                    <th>Total Balance</th>
                </tr>
            </thead>
            <tbody id="userTableBody">
                <tr>
                    <td colspan="4" style="color: #9ca3af; text-align: center; padding: 15px;">Awaiting secure data sync...</td>
                </tr>
            </tbody>
        </table>
    </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAxTd3U8V8kiJs1QHqJjVmgA1LGjkRhD-E",
    authDomain: "painxhub-355d5.firebaseapp.com",
    databaseURL: "https://painxhub-355d5-default-rtdb.firebaseio.com",
    projectId: "painxhub-355d5",
    storageBucket: "painxhub-355d5.appspot.com",
    messagingSenderId: "382129150451",
    appId: "1:382129150451:web:be5e0cf786968b368b9a86"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Send Broadcast Update
  document.getElementById('publishForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const postTitle = document.getElementById('title').value;
    const postContent = document.getElementById('content').value;
    const postId = 'post_' + Date.now();

    set(ref(db, 'posts/' + postId), {
      title: postTitle,
      content: postContent,
      timestamp: Date.now()
    }).then(() => {
      alert('Post successfully published to Firebase!');
      document.getElementById('publishForm').reset();
    }).catch((error) => {
      alert('Error: ' + error.message);
    });
  });

  // Track and build live registrations table automatically
  onValue(ref(db, 'users'), (snapshot) => {
    const tableBody = document.getElementById('userTableBody');
    tableBody.innerHTML = '';

    if (snapshot.exists()) {
      snapshot.forEach((childSnapshot) => {
        const user = childSnapshot.val();
        const row = document.createElement('tr');

        row.innerHTML = `
          <td><b>${user.email || 'Anonymous'}</b></td>
          <td style="color: #3b82f6; font-family: monospace;">${user.referralCode || 'N/A'}</td>
          <td>${user.usesCount || 0} / 3</td>
          <td style="color: #10b981; font-weight: bold;">₦${(user.balance || 0).toLocaleString()}</td>
        `;
        tableBody.appendChild(row);
      });
    } else {
      tableBody.innerHTML = `<tr><td colspan="4" style="color: #9ca3af; text-align: center;">No active registrations registered yet.</td></tr>`;
    }
  });
</script>
</body>
</html>
